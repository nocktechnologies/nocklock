name: Anvil (Codex Security Review)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  anvil-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Record shared Codex auth guard
        id: shared-codex-auth
        run: |
          AUTH_FILE="${HOME}/.codex/auth.json"
          if [[ -f "${AUTH_FILE}" ]]; then
            echo "auth_present=true" >> "$GITHUB_OUTPUT"
            shasum -a 256 "${AUTH_FILE}" | awk '{print "auth_sha="$1}' >> "$GITHUB_OUTPUT"
          else
            echo "auth_present=false" >> "$GITHUB_OUTPUT"
            echo "auth_sha=missing" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Install Codex CLI
        run: npm install -g @openai/codex@0.118.0

      - name: Prepare isolated Codex home
        run: |
          CODEX_HOME="${RUNNER_TEMP}/anvil-codex-home"
          mkdir -p "${CODEX_HOME}"
          chmod 700 "${CODEX_HOME}"
          echo "CODEX_HOME=${CODEX_HOME}" >> "$GITHUB_ENV"

      - name: Codex login (isolated Anvil auth)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Codex 0.118 reads its API key from auth.json, not the OPENAI_API_KEY
          # env var directly. Keep that auth file under CODEX_HOME so Anvil never
          # overwrites the runner's shared ~/.codex/auth.json.
          printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Verify isolated Codex auth location
        run: |
          if [[ ! -f "${CODEX_HOME}/auth.json" ]]; then
            echo "::error::Codex login did not write auth.json under CODEX_HOME."
            exit 1
          fi
          SHARED_AUTH_FILE="${HOME}/.codex/auth.json"
          if [[ "${{ steps.shared-codex-auth.outputs.auth_present }}" == "true" ]]; then
            SHARED_AUTH_SHA="$(shasum -a 256 "${SHARED_AUTH_FILE}" | awk '{print $1}')"
            if [[ "${SHARED_AUTH_SHA}" != "${{ steps.shared-codex-auth.outputs.auth_sha }}" ]]; then
              echo "::error::Codex login changed the shared auth file instead of isolated CODEX_HOME."
              exit 1
            fi
          elif [[ -f "${SHARED_AUTH_FILE}" ]]; then
            echo "::error::Codex login created a shared auth file instead of isolated CODEX_HOME."
            exit 1
          fi
          echo "Codex auth is isolated under CODEX_HOME."

      - name: Run Codex security review
        id: anvil
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          # Codex 0.118 rejects --base + positional PROMPT together. Pre-compute
          # the diff into a file and pass scope inside the prompt instead.
          git fetch --no-tags origin "$PR_BASE_REF" >/dev/null 2>&1
          mkdir -p .anvil
          git diff "origin/${PR_BASE_REF}...${PR_HEAD_SHA}" > .anvil/pr-diff.patch
          DIFF_LINES=$(wc -l < .anvil/pr-diff.patch | tr -d ' ')
          PROMPT="Security-focused adversarial review of PR #${PR_NUMBER}.

          Diff scope: changes between origin/${PR_BASE_REF} and HEAD (${PR_HEAD_SHA}).
          Pre-computed diff file: .anvil/pr-diff.patch (${DIFF_LINES} lines).
          Read that file first, then read the surrounding source for any region
          you need full context on.

          Check for: injection vulnerabilities (SQL, XSS, SSRF, command injection),
          auth/authz bypasses, insecure data handling, hard-coded secrets, CSRF
          issues, logic errors in security-critical paths. Report ALL findings
          with file and line references. Be thorough and adversarial."
          NO_COLOR=1 codex review \
            -c model="o4-mini" \
            -c 'sandbox_permissions=["workspace-read-access"]' \
            "$PROMPT" \
            > /tmp/anvil-output.txt 2>&1
          CODEX_EXIT=$?
          echo "codex_exit=$CODEX_EXIT" >> "$GITHUB_OUTPUT"
          {
            echo 'review<<ANVIL_REVIEW_EOF'
            head -c 60000 /tmp/anvil-output.txt
            echo 'ANVIL_REVIEW_EOF'
          } >> "$GITHUB_OUTPUT"
          # Always exit 0 here so the comment-posting step runs. The final
          # step re-surfaces the codex exit code as the job result.
          exit 0

      - name: Post Anvil review comment
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          ANVIL_REVIEW: ${{ steps.anvil.outputs.review }}
          ANVIL_EXIT: ${{ steps.anvil.outputs.codex_exit }}
        with:
          script: |
            const output = process.env.ANVIL_REVIEW || '';
            const exitCode = process.env.ANVIL_EXIT || '0';
            const header = exitCode === '0'
              ? '## 🔨 Anvil Security Review (Codex)'
              : `## 🔨 Anvil Security Review (Codex) — FAILED (codex exit ${exitCode})`;
            const body = [
              header,
              '',
              '```',
              output || 'No output captured — verify OPENAI_API_KEY secret is set on this repo.',
              '```',
              '',
              '*Adversarial security audit powered by OpenAI Codex o4-mini. Does not replace human review.*',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Verify shared Codex auth untouched
        if: always()
        env:
          AUTH_PRESENT_BEFORE: ${{ steps.shared-codex-auth.outputs.auth_present }}
          AUTH_SHA_BEFORE: ${{ steps.shared-codex-auth.outputs.auth_sha }}
        run: |
          AUTH_FILE="${HOME}/.codex/auth.json"
          if [[ "${AUTH_PRESENT_BEFORE}" == "true" ]]; then
            if [[ ! -f "${AUTH_FILE}" ]]; then
              echo "::error::Shared Codex auth file disappeared during Anvil."
              exit 1
            fi
            AUTH_SHA_AFTER="$(shasum -a 256 "${AUTH_FILE}" | awk '{print $1}')"
          else
            if [[ -f "${AUTH_FILE}" ]]; then
              echo "::error::Shared Codex auth file was created during Anvil."
              exit 1
            fi
            AUTH_SHA_AFTER="missing"
          fi
          if [[ "${AUTH_SHA_AFTER}" != "${AUTH_SHA_BEFORE}" ]]; then
            echo "::error::Shared Codex auth file changed during Anvil."
            exit 1
          fi
          echo "Shared Codex auth unchanged."

      - name: Cleanup isolated Codex home
        if: always()
        run: |
          case "${CODEX_HOME:-}" in
            "${RUNNER_TEMP}/"*)
              if [[ -d "${CODEX_HOME}" ]]; then
                chmod -R u+rwX "${CODEX_HOME}" 2>/dev/null || true
                rm -rf "${CODEX_HOME}"
              fi
              ;;
            *)
              echo "::error::Refusing to clean unexpected CODEX_HOME path: ${CODEX_HOME:-unset}"
              exit 1
              ;;
          esac

      - name: Fail job if Codex errored
        if: steps.anvil.outputs.codex_exit != '0'
        env:
          CODEX_EXIT: ${{ steps.anvil.outputs.codex_exit }}
        run: |
          echo "::error::Codex security review exited ${CODEX_EXIT} — see PR comment for captured output."
          exit 1
